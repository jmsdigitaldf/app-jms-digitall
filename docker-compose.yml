version: '3.8'

services:
  # Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: jms_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-jms_digitall}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jms_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jms_backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-jms_digitall}
      PORT: 3000
    depends_on:
      - db
    networks:
      - jms_network

  # Frontend Web
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jms_frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jms_network

volumes:
  db_data:
    driver: local

networks:
  jms_network:
    driver: bridge
