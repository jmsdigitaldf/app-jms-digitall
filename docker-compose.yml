version: '3.8'

services:
  # Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: jms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jms_digitall
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jms_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jms_backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/jms_digitall
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jms_network
    # Expõe a porta apenas internamente na rede do Docker, ou mapeie se precisar acessar a API diretamente de fora
    # ports:
    #   - "3000:3000"

  # Frontend Web
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jms_frontend
    restart: always
    environment:
      VITE_API_URL: http://localhost:3000/api # Ajuste conforme necessário para produção
    ports:
      - "80:80" # Acessível na porta 80 do servidor
    depends_on:
      - backend
    networks:
      - jms_network

volumes:
  db_data:
    driver: local

networks:
  jms_network:
    driver: bridge
